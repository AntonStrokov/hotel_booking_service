version: '3.8'

services:
  db:
    image: postgres:17
    container_name: hotel_booking_db
    environment:
      POSTGRES_DB: hotel_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"

  # MongoDB для хранения статистики
  mongodb:
    image: mongo:latest
    container_name: hotel-mongodb
    ports:
      - "27017:27017"

  # Zookeeper для Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka брокер
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  app:
    build:
      context: ./hotel-booking-service
      dockerfile: Dockerfile
    container_name: hotel_booking_app
    ports:
      - "8080:8080"
    depends_on:
      - db
      - kafka
      - mongodb
    environment:
      - SPRING_PROFILES_ACTIVE=docker # Docker starting profile

        #IDE starting profile
#      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hotel_service
#      SPRING_DATASOURCE_USERNAME: postgres
#      SPRING_DATASOURCE_PASSWORD: 123
#      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/statistics_db
#      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
